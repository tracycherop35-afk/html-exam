<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> HTML Fundamentals Exam</title>
    <style>
        :root {
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --primary: #4f6ef7;
            --primary-hover: #3b54e0;
            --success: #22c55e;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --transition: 0.25s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background-image:
                radial-gradient(ellipse at 20% 20%, rgba(79, 110, 247, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(34, 197, 94, 0.05) 0%, transparent 50%);
        }

        .exam-container {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 750px;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        .exam-header {
            background: linear-gradient(135deg, #4f6ef7 0%, #6366f1 100%);
            color: #fff;
            padding: 22px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 14px;
        }
        .exam-header .title-area h1 {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .exam-header .title-area .subtitle {
            font-size: 0.85rem;
            opacity: 0.85;
            margin-top: 2px;
        }
        .timer-box {
            background: rgba(255, 255, 255, 0.18);
            border-radius: 50px;
            padding: 10px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            backdrop-filter: blur(6px);
            min-width: 90px;
            justify-content: center;
            transition: background var(--transition);
        }
        .timer-box.warning {
            background: rgba(239, 68, 68, 0.7);
            animation: pulse 0.7s infinite alternate;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.06); }
        }
        .timer-icon {
            font-size: 1.2rem;
        }

        .progress-wrap {
            padding: 14px 28px 0;
            background: var(--card-bg);
        }
        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-light);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .progress-bar {
            height: 8px;
            background: #e2e8f0;
            border-radius: 20px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 20px;
            transition: width 0.4s ease;
            width: 0%;
        }

        .exam-body {
            padding: 24px 28px 20px;
        }
        .question-number {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary);
            font-weight: 700;
            margin-bottom: 6px;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 22px;
            line-height: 1.5;
            color: var(--text);
        }

        .options-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .option-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafbfc;
            font-weight: 500;
            user-select: none;
        }
        .option-item:hover {
            border-color: #c4cdf9;
            background: #f5f7ff;
            transform: translateX(2px);
        }
        .option-item.selected {
            border-color: var(--primary);
            background: #eef1ff;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
        }
        .option-item.correct-reveal {
            border-color: var(--success) !important;
            background: #f0fdf4 !important;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1) !important;
        }
        .option-item.wrong-reveal {
            border-color: var(--danger) !important;
            background: #fef2f2 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
        }
        .option-radio {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid #cbd5e1;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition);
            background: #fff;
        }
        .option-item.selected .option-radio {
            border-color: var(--primary);
            background: var(--primary);
        }
        .option-item.selected .option-radio::after {
            content: '';
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
        }
        .option-label {
            font-weight: 600;
            color: var(--primary);
            min-width: 26px;
        }
        .option-text {
            flex: 1;
        }

        .fill-input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            transition: all var(--transition);
            background: #fafbfc;
            outline: none;
        }
        .fill-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(79, 110, 247, 0.08);
            background: #fff;
        }
        .fill-input.correct-reveal {
            border-color: var(--success) !important;
            background: #f0fdf4 !important;
        }
        .fill-input.wrong-reveal {
            border-color: var(--danger) !important;
            background: #fef2f2 !important;
        }

        .tf-group {
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .tf-btn {
            flex: 1;
            min-width: 120px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: all var(--transition);
            background: #fafbfc;
            user-select: none;
        }
        .tf-btn:hover {
            border-color: #c4cdf9;
            background: #f5f7ff;
        }
        .tf-btn.selected {
            border-color: var(--primary);
            background: #eef1ff;
            box-shadow: 0 0 0 3px rgba(79, 110, 247, 0.1);
        }
        .tf-btn.correct-reveal {
            border-color: var(--success) !important;
            background: #f0fdf4 !important;
        }
        .tf-btn.wrong-reveal {
            border-color: var(--danger) !important;
            background: #fef2f2 !important;
        }

        .exam-footer {
            padding: 18px 28px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            border-top: 1px solid var(--border);
            background: #fdfdfd;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 0.95rem;
            cursor: pointer;
            border: none;
            transition: all var(--transition);
            letter-spacing: 0.2px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-prev {
            background: #f1f5f9;
            color: var(--text);
        }
        .btn-prev:hover {
            background: #e2e8f0;
        }
        .btn-next {
            background: var(--primary);
            color: #fff;
        }
        .btn-next:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(79, 110, 247, 0.35);
        }
        .btn-submit {
            background: var(--success);
            color: #fff;
        }
        .btn-submit:hover {
            background: #16a34a;
            transform: translateY(-1px);
            box-shadow: 0 4px 14px rgba(34, 197, 94, 0.35);
        }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
            cursor: not-allowed;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover {
            border-color: #c4cdf9;
            background: #f5f7ff;
        }
        .nav-dots {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            align-items: center;
        }
        .nav-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #d1d5db;
            transition: all var(--transition);
        }
        .nav-dot.active {
            background: var(--primary);
            width: 12px;
            height: 12px;
        }
        .nav-dot.answered {
            background: #a5b4fc;
        }

        .results-screen {
            text-align: center;
            padding: 40px 28px;
        }
        .results-screen .score-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.6rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: conic-gradient(var(--success) var(--score-percent), #e2e8f0 var(--score-percent));
            position: relative;
        }
        .results-screen .score-circle::before {
            content: '';
            position: absolute;
            inset: 12px;
            background: #fff;
            border-radius: 50%;
        }
        .results-screen .score-circle span {
            position: relative;
            z-index: 1;
        }
        .results-grade {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .results-detail {
            color: var(--text-light);
            margin-bottom: 20px;
            line-height: 1.6;
        }
        .emoji-big {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="exam-container" id="examContainer">
        <!-- Header -->
        <div class="exam-header">
            <div class="title-area">
                <HTML Fundamentals Exam</h1>
                <div class="subtitle">Answer all HTML questions within the time limit</div>
            </div>
            <div class="timer-box" id="timerBox">
                <span class="timer-icon">⏱</span>
                <span id="timerDisplay">60:00</span>
            </div>
        </div>

        <!-- Progress -->
        <div class="progress-wrap">
            <div class="progress-info">
                <span id="progressLabel">Question 1 of 10</span>
                <span id="answeredCount">0 answered</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="nav-dots" id="navDots" style="margin-top:8px;justify-content:center;"></div>
        </div>

        <!-- Body -->
        <div class="exam-body" id="examBody"></div>

        <!-- Footer -->
        <div class="exam-footer" id="examFooter">
            <button class="btn btn-prev" id="btnPrev" disabled>⬅ Previous</button>
            <button class="btn btn-next" id="btnNext">Next ➡</button>
            <button class="btn btn-submit" id="btnSubmit" style="display:none;">✅ Submit Exam</button>
        </div>

        <!-- Results (hidden by default) -->
        <div class="results-screen" id="resultsScreen" style="display:none;"></div>
    </div>

    <script>
        (function() {
            // ──────────────────────────────────────
            // HTML EXAM QUESTIONS (1 hour)
            // ──────────────────────────────────────
            const questions = [
                {
                    id: 1,
                    type: 'mcq',
                    question: 'What does HTML stand for?',
                    options: [
                        'Hyper Text Markup Language',
                        'High Tech Modern Language',
                        'Home Tool Markup Language',
                        'Hyperlinks and Text Markup Language'
                    ],
                    answer: 0, // index 0 = Hyper Text Markup Language
                },
                {
                    id: 2,
                    type: 'fill',
                    question: 'Which HTML tag is used to define the largest heading? (Enter only the tag name, e.g., p)',
                    answer: 'h1',
                },
                {
                    id: 3,
                    type: 'mcq',
                    question: 'Which tag is used to create a hyperlink in HTML?',
                    options: ['<link>', '<a>', '<href>', '<url>'],
                    answer: 1,
                },
                {
                    id: 4,
                    type: 'tf',
                    question: 'The <img> tag requires a closing tag.',
                    answer: false, // it's self-closing
                },
                {
                    id: 5,
                    type: 'mcq',
                    question: 'Which attribute is used to specify the URL of an image in an <img> tag?',
                    options: ['href', 'src', 'link', 'url'],
                    answer: 1,
                },
                {
                    id: 6,
                    type: 'fill',
                    question: 'What is the correct HTML element for inserting a line break? (Enter the tag name only)',
                    answer: 'br',
                },
                {
                    id: 7,
                    type: 'mcq',
                    question: 'Which of the following is the correct way to create a numbered list?',
                    options: ['<ul>', '<ol>', '<list>', '<nl>'],
                    answer: 1,
                },
                {
                    id: 8,
                    type: 'tf',
                    question: 'The <title> tag belongs inside the <body> section.',
                    answer: false, // it belongs in the <head>
                },
                {
                    id: 9,
                    type: 'mcq',
                    question: 'Which HTML element is used to define the structure of an HTML document and must contain <head> and <body>?',
                    options: ['<html>', '<document>', '<root>', '<page>'],
                    answer: 0,
                },
                {
                    id: 10,
                    type: 'fill',
                    question: 'What attribute is used to provide alternative text for an image? (Enter the attribute name only)',
                    answer: 'alt',
                }
            ];

            // ──────────────────────────────────────
            // STATE
            // ──────────────────────────────────────
            const totalQuestions = questions.length;
            const totalTime = 60 * 60; // 60 minutes in seconds
            let currentIndex = 0;
            let userAnswers = new Array(totalQuestions).fill(null);
            let timeRemaining = totalTime;
            let timerInterval = null;
            let examSubmitted = false;

            // ──────────────────────────────────────
            // DOM REFS
            // ──────────────────────────────────────
            const examBody = document.getElementById('examBody');
            const examFooter = document.getElementById('examFooter');
            const resultsScreen = document.getElementById('resultsScreen');
            const timerDisplay = document.getElementById('timerDisplay');
            const timerBox = document.getElementById('timerBox');
            const progressFill = document.getElementById('progressFill');
            const progressLabel = document.getElementById('progressLabel');
            const answeredCount = document.getElementById('answeredCount');
            const navDots = document.getElementById('navDots');
            const btnPrev = document.getElementById('btnPrev');
            const btnNext = document.getElementById('btnNext');
            const btnSubmit = document.getElementById('btnSubmit');

            function formatTime(seconds) {
                const min = Math.floor(seconds / 60);
                const sec = seconds % 60;
                return `${min}:${sec.toString().padStart(2, '0')}`;
            }

            function updateTimerUI() {
                timerDisplay.textContent = formatTime(timeRemaining);
                if (timeRemaining <= 120) { // warn at 2 minutes left
                    timerBox.classList.add('warning');
                } else {
                    timerBox.classList.remove('warning');
                }
            }

            function updateProgressUI() {
                const answered = userAnswers.filter(a => a !== null && a !== '').length;
                progressFill.style.width = `${(answered / totalQuestions) * 100}%`;
                progressLabel.textContent = `Question ${currentIndex + 1} of ${totalQuestions}`;
                answeredCount.textContent = `${answered} answered`;
                renderNavDots();
            }

            function renderNavDots() {
                let html = '';
                for (let i = 0; i < totalQuestions; i++) {
                    let cls = 'nav-dot';
                    if (i === currentIndex) cls += ' active';
                    if (userAnswers[i] !== null && userAnswers[i] !== '') cls += ' answered';
                    html += `<span class="${cls}" title="Q${i+1}"></span>`;
                }
                navDots.innerHTML = html;
            }

            function updateButtons() {
                btnPrev.disabled = currentIndex === 0;
                if (currentIndex === totalQuestions - 1) {
                    btnNext.style.display = 'none';
                    btnSubmit.style.display = 'inline-flex';
                } else {
                    btnNext.style.display = 'inline-flex';
                    btnSubmit.style.display = 'none';
                }
            }

            function getSavedAnswer(index) {
                return userAnswers[index];
            }

            function saveAnswer(index, value) {
                userAnswers[index] = value;
                updateProgressUI();
            }

            function renderQuestion(index) {
                const q = questions[index];
                const saved = getSavedAnswer(index);
                let html = '';
                html += `<div class="question-number">Question ${q.id} • ${q.type.toUpperCase()}</div>`;
                html += `<div class="question-text">${q.question}</div>`;

                if (q.type === 'mcq') {
                    html += '<ul class="options-list">';
                    const labels = ['A', 'B', 'C', 'D'];
                    q.options.forEach((opt, i) => {
                        const selected = (saved === i) ? ' selected' : '';
                        html += `
                            <li class="option-item${selected}" data-opt-index="${i}" data-q-index="${index}">
                                <div class="option-radio"></div>
                                <span class="option-label">${labels[i]}.</span>
                                <span class="option-text">${opt}</span>
                            </li>`;
                    });
                    html += '</ul>';
                } else if (q.type === 'tf') {
                    html += '<div class="tf-group">';
                    const tfOptions = [
                        { val: true, label: '✅ True' },
                        { val: false, label: '❌ False' },
                    ];
                    tfOptions.forEach(opt => {
                        const selected = (saved === opt.val) ? ' selected' : '';
                        html += `<div class="tf-btn${selected}" data-tf-val="${opt.val}" data-q-index="${index}">${opt.label}</div>`;
                    });
                    html += '</div>';
                } else if (q.type === 'fill') {
                    const val = (saved !== null) ? saved : '';
                    html += `<input type="text" class="fill-input" id="fillInput" data-q-index="${index}" placeholder="Type your answer..." value="${escapeHtml(val)}" autocomplete="off">`;
                }

                examBody.innerHTML = html;
                attachEventListeners(index);
                updateButtons();
                updateProgressUI();
            }

            function escapeHtml(str) {
                const div = document.createElement('div');
                div.textContent = str;
                return div.innerHTML;
            }

            function attachEventListeners(index) {
                const q = questions[index];

                // MCQ
                const optionItems = examBody.querySelectorAll('.option-item');
                optionItems.forEach(item => {
                    item.addEventListener('click', function() {
                        if (examSubmitted) return;
                        const optIndex = parseInt(this.dataset.optIndex);
                        optionItems.forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                        saveAnswer(index, optIndex);
                    });
                });

                // True/False
                const tfBtns = examBody.querySelectorAll('.tf-btn');
                tfBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        if (examSubmitted) return;
                        const val = this.dataset.tfVal === 'true';
                        tfBtns.forEach(el => el.classList.remove('selected'));
                        this.classList.add('selected');
                        saveAnswer(index, val);
                    });
                });

                // Fill-in-the-blank
                const fillInput = examBody.querySelector('#fillInput');
                if (fillInput) {
                    fillInput.addEventListener('input', function() {
                        if (examSubmitted) return;
                        saveAnswer(index, this.value.trim());
                    });
                    setTimeout(() => fillInput.focus(), 100);
                }
            }

            function goToQuestion(index) {
                if (index < 0 || index >= totalQuestions) return;
                currentIndex = index;
                renderQuestion(currentIndex);
            }

            btnPrev.addEventListener('click', () => {
                if (currentIndex > 0) goToQuestion(currentIndex - 1);
            });
            btnNext.addEventListener('click', () => {
                if (currentIndex < totalQuestions - 1) goToQuestion(currentIndex + 1);
            });

            function calculateScore() {
                let correct = 0;
                const details = [];
                questions.forEach((q, i) => {
                    const userAns = userAnswers[i];
                    let isCorrect = false;
                    if (q.type === 'mcq') {
                        isCorrect = (userAns === q.answer);
                    } else if (q.type === 'tf') {
                        isCorrect = (userAns === q.answer);
                    } else if (q.type === 'fill') {
                        if (userAns === null || userAns === '') {
                            isCorrect = false;
                        } else {
                            isCorrect = (userAns.toString().trim().toLowerCase() === q.answer.toString().trim().toLowerCase());
                        }
                    }
                    if (isCorrect) correct++;
                    details.push({ question: q, userAnswer: userAns, isCorrect });
                });
                return { correct, total: totalQuestions, details };
            }

            function renderResults(scoreData) {
                const { correct, total, details } = scoreData;
                const percent = Math.round((correct / total) * 100);
                let grade = '';
                let emoji = '';
                if (percent >= 90) { grade = 'Excellent! ; }
                else if (percent >= 70) { grade = 'Good Job! ; }
                else if (percent >= 50) { grade = 'Not Bad! }
                else { grade = 'Keep Studying! ' }

                let html = '';
                html += `<span class="emoji-big">${emoji}</span>`;
                html += `<div class="score-circle" style="--score-percent:${percent}%;"><span>${percent}%</span></div>`;
                html += `<div class="results-grade">${grade}</div>`;
                html += `<div class="results-detail">You answered <strong>${correct} out of ${total}</strong> questions correctly.<br>Time remaining: <strong>${formatTime(timeRemaining)}</strong></div>`;

                html += '<div style="text-align:left;margin-top:20px;max-height:300px;overflow-y:auto;padding-right:8px;">';
                details.forEach((d, i) => {
                    const icon = d.isCorrect ? '✅' : '❌';
                    const bgColor = d.isCorrect ? '#f0fdf4' : '#fef2f2';
                    const borderColor = d.isCorrect ? '#22c55e' : '#ef4444';
                    const q = d.question;
                    let correctAnswerStr = '';
                    if (q.type === 'mcq') correctAnswerStr = q.options[q.answer];
                    else if (q.type === 'tf') correctAnswerStr = q.answer ? 'True' : 'False';
                    else correctAnswerStr = q.answer;

                    let userAnswerStr = 'No answer';
                    if (d.userAnswer !== null && d.userAnswer !== '') {
                        if (q.type === 'mcq') userAnswerStr = q.options[d.userAnswer] || 'Invalid';
                        else if (q.type === 'tf') userAnswerStr = d.userAnswer ? 'True' : 'False';
                        else userAnswerStr = d.userAnswer;
                    }

                    html += `
                        <div style="background:${bgColor};border-left:4px solid ${borderColor};border-radius:8px;padding:10px 14px;margin-bottom:8px;font-size:0.9rem;">
                            <strong>Q${i+1}:</strong> ${q.question}<br>
                            <span style="color:#64748b;">Your answer:</span> ${userAnswerStr}<br>
                            <span style="color:#64748b;">Correct answer:</span> ${correctAnswerStr} ${icon}
                        </div>`;
                });
                html += '</div>';
                html += `<button class="btn btn-outline" onclick="location.reload()" style="margin-top:20px;">🔄 Retake Exam</button>`;

                resultsScreen.innerHTML = html;
                examBody.style.display = 'none';
                examFooter.style.display = 'none';
                resultsScreen.style.display = 'block';
                document.querySelector('.progress-wrap').style.display = 'none';
            }

            function submitExam() {
                if (examSubmitted) return;
                examSubmitted = true;
                clearInterval(timerInterval);
                const scoreData = calculateScore();
                renderResults(scoreData);
                timerBox.classList.remove('warning');
                timerDisplay.textContent = formatTime(timeRemaining);
            }

            btnSubmit.addEventListener('click', () => {
                const unanswered = userAnswers.filter(a => a === null || a === '').length;
                if (unanswered > 0) {
                    const confirmSubmit = confirm(`You have ${unanswered} unanswered question(s). Are you sure you want to submit?`);
                    if (!confirmSubmit) return;
                }
                submitExam();
            });

            function startTimer() {
                updateTimerUI();
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    updateTimerUI();
                    if (timeRemaining <= 0) {
                        clearInterval(timerInterval);
                        alert('Time is up! Your exam will be submitted automatically.');
                        submitExam();
                    }
                }, 1000);
            }

            document.addEventListener('keydown', function(e) {
                if (examSubmitted) return;
                if (e.key === 'ArrowLeft' && currentIndex > 0) {
                    e.preventDefault();
                    goToQuestion(currentIndex - 1);
                } else if (e.key === 'ArrowRight' && currentIndex < totalQuestions - 1) {
                    e.preventDefault();
                    goToQuestion(currentIndex + 1);
                } else if (e.key === 'Enter' && currentIndex === totalQuestions - 1) {
                    e.preventDefault();
                    btnSubmit.click();
                }
                const q = questions[currentIndex];
                if (q.type === 'mcq' && !examSubmitted) {
                    const keyMap = { 'a': 0, 'b': 1, 'c': 2, 'd': 3, '1': 0, '2': 1, '3': 2, '4': 3 };
                    const idx = keyMap[e.key.toLowerCase()];
                    if (idx !== undefined && idx < q.options.length) {
                        e.preventDefault();
                        saveAnswer(currentIndex, idx);
                        const items = examBody.querySelectorAll('.option-item');
                        items.forEach(el => el.classList.remove('selected'));
                        if (items[idx]) items[idx].classList.add('selected');
                        updateProgressUI();
                    }
                }
                if (q.type === 'tf' && !examSubmitted) {
                    if (e.key.toLowerCase() === 't' || e.key === '1') {
                        e.preventDefault();
                        saveAnswer(currentIndex, true);
                        const btns = examBody.querySelectorAll('.tf-btn');
                        btns.forEach(el => el.classList.remove('selected'));
                        if (btns[0]) btns[0].classList.add('selected');
                        updateProgressUI();
                    } else if (e.key.toLowerCase() === 'f' || e.key === '2') {
                        e.preventDefault();
                        saveAnswer(currentIndex, false);
                        const btns = examBody.querySelectorAll('.tf-btn');
                        btns.forEach(el => el.classList.remove('selected'));
                        if (btns[1]) btns[1].classList.add('selected');
                        updateProgressUI();
                    }
                }
            });

            function initExam() {
                currentIndex = 0;
                userAnswers = new Array(totalQuestions).fill(null);
                timeRemaining = totalTime;
                examSubmitted = false;
                examBody.style.display = 'block';
                examFooter.style.display = 'flex';
                resultsScreen.style.display = 'none';
                document.querySelector('.progress-wrap').style.display = 'block';
                renderQuestion(0);
                startTimer();
                updateProgressUI();
            }

            initExam();
            console.log('HTML Exam ready! Use arrow keys, A-D/1-4 for MCQ, T/F for True/False.');
        })();
    </script>
</body>
</html>
